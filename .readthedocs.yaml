# taken from https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-pixi
version: 2

build:
   os: ubuntu-24.04
   tools:
       python: "latest"
   jobs:
      create_environment:
         - asdf plugin add pixi
         - asdf install pixi latest
         - asdf global pixi latest
      install:
         - pixi install -e docs
      build:
         html:
            - pixi run -e docs sphinx-build -T -b html docs $READTHEDOCS_OUTPUT/html
